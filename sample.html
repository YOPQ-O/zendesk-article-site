<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプルページ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 15px;
      font-size: 32px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 18px;
      line-height: 1.6;
    }

    .features {
      display: grid;
      gap: 20px;
      margin-bottom: 40px;
      text-align: left;
    }

    .feature {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .feature:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .feature h3 {
      color: #333;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .feature p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .cta-button {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .footer {
      margin-top: 40px;
      color: #999;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 28px;
      }

      .logo {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌟</div>
    <h1>ようこそ！</h1>
    <p class="subtitle">シンプルで美しいサンプルページです。</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <h3>高速レスポンス</h3>
        <p>最適化されたコードで快適な体験を提供します。</p>
      </div>

      <div class="feature">
        <div class="feature-icon">🎨</div>
        <h3>美しいデザイン</h3>
        <p>モダンなデザインで視覚的に魅力的です。</p>
      </div>

      <div class="feature">
        <div class="feature-icon">📱</div>
        <h3>レスポンシブ対応</h3>
        <p>どのデバイスからでも快適に閲覧できます。</p>
      </div>
    </div>

    <a href="#" class="cta-button" onclick="showMessage(); return false;">
      始めましょう
    </a>

    <div class="footer">
      <p>© 2026 Sample Page. All rights reserved.</p>
    </div>
  </div>

  <script>
    function showMessage() {
      alert('ボタンがクリックされました！✨');
    }

    // Simple animation on load
    window.addEventListener('load', function() {
      const container = document.querySelector('.container');
      container.style.opacity = '0';
      container.style.transform = 'translateY(20px)';

      setTimeout(() => {
        container.style.transition = 'all 0.5s ease';
        container.style.opacity = '1';
        container.style.transform = 'translateY(0)';
      }, 100);
    });
  </script>
</body>
</html>
